name: Build Windows Clean

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/cockpit-cliproxy/go.mod

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify Clean edition invariants
        run: npm run check:clean

      - name: Sync version
        run: npm run sync-version

      - name: Build Windows application
        run: npx tauri build --ci --config src-tauri/tauri.ci.conf.json

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-tools-clean-windows
          path: target/release/bundle/**
          if-no-files-found: error
